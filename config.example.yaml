# Скопируйте этот файл в config.yaml.
# Большинство полей можно оставить как есть.

browser:
  # Папка для хранения профиля браузера (куки, localStorage). Логин делается один раз.
  user_data_dir: "user-data"
  # Запускать ли браузер видимым. Для первой авторизации обязательно false → видимый.
  # Дальше можете поставить true (headless) для фонового запуска.
  headless: false
  # Таймаут навигации/ожидания элементов, мс
  default_timeout_ms: 20000
  # Замедление действий браузера для "человечности" (мс между шагами Playwright)
  slow_mo_ms: 50
  # Локаль/часовой пояс — чтобы фингерпринт выглядел как у живого пользователя из РФ
  locale: "ru-RU"
  timezone: "Europe/Moscow"

# Сколько максимум секунд ждать пока пользователь сам залогинится в открытом браузере
login_timeout_seconds: 600

# Профиль кандидата — GUI заполняет эти поля и на их основе строит поиск и сопроводительное.
profile:
  full_name: "Дидоренко Александр Святославович"
  city: "Москва"
  hard_skills:
    - "Figma"
    - "Adobe Photoshop"
    - "Adobe Illustrator"
    - "UI/UX"
    - "Веб-дизайн"
    - "Графический дизайн"
    - "Дизайн интерфейсов"
    - "Prototyping"
    - "Wireframing"
    - "Дизайн мобильных приложений"
    - "Adobe After Effects"
    - "Sketch"
  soft_skills:
    - "командная работа"
    - "ответственность"
    - "коммуникация"
  work_format: "remote"
  experience: "between1And3"
  desired_salary: 100000
  desired_role: "Дизайнер"
  telegram: "t.me/alexaneodev"
  github: "github.com/saneome"
  extra_contacts: []

# Уведомления
notifications:
  telegram:
    token: "YOUR_BOT_TOKEN"        # Токен Telegram-бота (BotFather)
    chat_id: "YOUR_CHAT_ID"        # ID чата (или username), куда писать уведомления
    # proxy: "http://user:pass@host:port"   # HTTP/HTTPS прокси для Telegram API
    # proxy: "socks5://user:pass@host:port" # SOCKS5 прокси (требует pip install pysocks)
  daily_report_time: "21:00"

# Параметры поиска вакансий — превращаются в URL https://hh.ru/search/vacancy?...
search:
  # Регион может подставиться автоматически из profile.city; null = брать из GUI-профиля.
  area: null
  # Опыт: noExperience, between1And3, between3And6, moreThan6
  experience:
    - between1And3
  # Если формат удалённый, к поиску добавляется schedule=remote
  schedule: remote
  remote_work_format: true
  # Поисковые запросы можно оставить пустыми — GUI сгенерирует их из profile.*
  queries:
    - "Дизайнер"
    - "UI/UX дизайнер"
    - "Веб-дизайнер"
    - "Графический дизайнер"
    - "Дизайнер интерфейсов"
    - "Product дизайнер"
    - "Дизайнер мобильных приложений"
    - "Figma дизайнер"
  # Сколько страниц максимум листать на каждый запрос (на странице ~50 вакансий)
  max_pages: 5

# Сопроводительное письмо
cover_letter:
  # Письмо собирается через NVIDIA NIM, если в .env задан NIM_API_KEY.
  # Если true — в письмо подставится фраза про опыт 1–2 года (для прохождения ATS)
  pretend_experience: false
  telegram: "t.me/alexaneodev"
  github: "github.com/saneome"

# Рандомизация задержек между откликами (секунды). 30с..180с = 0.5..3 минуты.
rate_limit:
  min_seconds: 30
  max_seconds: 180
  long_break_chance: 0.07
  long_break_min_seconds: 300   # 5 минут
  long_break_max_seconds: 900  # 15 минут

# Куда писать список уже отправленных откликов
applied_log: "applied.json"

# Сколько откликов максимум за один запуск (0 = без лимита)
max_per_run: 30

# Куда сохранять скриншоты при ошибках (чтобы было видно, что пошло не так)
screenshots_dir: "screenshots"

# Если true — поиск и навигация будут, но кнопка "Откликнуться" нажиматься не будет
dry_run: false

# Ответы работодателям (responder) — проверяет переписку и генерирует ответы через LLM
responder:
  # Вероятность проверки переписки после каждого отклика (0.0 — 1.0)
  chance: 0.15
  # Автоотправка ответов работодателям (иначе — только генерация для ручной проверки)
  auto_reply: false
  # Интервал между циклами проверки переписки в режиме --loop (секунды)
  check_interval_seconds: 300
